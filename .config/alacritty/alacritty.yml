
env:
  TERM: xterm-256color

window:
  dynamic_title: true
  padding:
    x: 4
    y: 4

background_opacity: 1

font:
  size: 14
  normal:
    family: Fantasque Sans Mono
  bold:
    family: Fantasque Sans Mono
  italic:
    family: Fantasque Sans Mono
  bold_italic:
    family: Fantasque Sans Mono

  offset:
    x: 0
    y: 0

cursor:
  style: Block
  unfocused_hollow: false

mouse:
  hide_when_typing: false
  url:
    launcher:
      program: google-chrome-stable

key_bindings:
  - { key: K, mods: Alt,  action: ScrollPageUp   }
  - { key: J, mods: Alt,  action: ScrollPageDown }
  - { key: Y, mods: Control,  action: Copy }
  - { key: P, mods: Control,  action: Paste }

mouse_bindings:
  - { mouse: Middle, action: PasteSelection }

schemes:
  onedark: &onedark
    primary:
      background: '#000000'
      foreground: '#abb2bf'
    selection:
      text:       CellForeground
      background: '#3e4451' # syntax-selection-color
    normal:
      black:      '#5c6370' # mono-3
      red:        '#e06c75' # red 1
      green:      '#98c379'
      yellow:     '#e5c07b' # orange 2
      blue:       '#61afef'
      magenta:    '#c678dd'
      cyan:       '#56b6c2'
      white:      '#828997' # mono-2

  fairyfloss: &fairyfloss
    primary:
      background: '#1d1f21'
      foreground: '#f8f8f2'
    cursor:
      text: '#f8f8f2'
      cursor: '#c7b7c7'
    normal:
      black: '#3b3a32'
      red: '#f1756f'
      green: '#6de874'
      yellow: '#e6c000'
      blue: '#a381ff'
      magenta: '#ff87b1'
      cyan: '#7ef5b8'
      white: '#c7b7c7'
    bright:
      black: '#685868'
      red: '#ff9f9a'
      green: '#7bfa81'
      yellow: '#ffea00'
      blue: '#c5a3ff'
      magenta: '#ffb8d1'
      cyan: '#c2ffdf'
      white: '#ffefff'
  dracula: &dracula
    primary:
      background: '#000000'
      foreground: '#f8f8f2'

    # Normal colors
    normal:
      black:   '#000000'
      red:     '#ff5555'
      green:   '#50fa7b'
      yellow:  '#f1fa8c'
      blue:    '#caa9fa'
      magenta: '#ff79c6'
      cyan:    '#8be9fd'
      white:   '#bfbfbf'

    # Bright colors
    bright:
      black:   '#575b70'
      red:     '#ff6e67'
      green:   '#5af78e'
      yellow:  '#f4f99d'
      blue:    '#caa9fa'
      magenta: '#ff92d0'
      cyan:    '#9aedfe'
      white:   '#e6e6e6'
colors: *dracula
